<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador Financeiro</title>
    <style>
        /* Reset básico e fontes */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        /* Container Principal */
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            font-size: 24px;
            color: #2c3e50;
            margin-bottom: 20px;
            text-align: center;
        }

        /* Formulário de Entrada */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        label {
            font-weight: 600;
            font-size: 14px;
            color: #7f8c8d;
        }

        input {
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: #3498db;
        }

        /* Botão */
        button {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #2980b9;
        }

        /* Área de Resultado */
        #saida {
            margin-top: 25px;
            border-top: 2px solid #f1f2f6;
        }

        .resultado-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            font-size: 16px;
            border-bottom: 1px dashed #e2e8f0;
        }

        .resultado-item:last-child {
            border-bottom: none;
        }

        .label-categoria {
            font-weight: 500;
            color: #555;
        }

        /* Cores e estilos para cada categoria */
        .valor-categoria {
            font-weight: 700;
        }
        .necessidades { color: #e74c3c; }
        .desejos { color: #f39c12; }
        .investimentos { color: #2ecc71; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Gerenciador 50/30/20</h1>
        
        <div class="form-group">
            <label for="valor">Valor Total (R$)</label>    
            <input type="number" id="valor" placeholder="Ex: 2000" step="0.01">
        </div>
        
        <button onclick="calcular()">Calcular Divisão</button>

        <div id="saida"></div>
    </div>

     <script>
        function formatarMoeda(valor) {
            // Formata o número no padrão de moeda brasileiro (R$ 0,00)
            return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        function calcular() {
            const valorInput = document.getElementById('valor').value;
            const valor = parseFloat(valorInput);
            const saida = document.getElementById('saida');

            if (isNaN(valor) || valor <= 0) {
                alert('Por favor, insira um número válido e maior que zero.');
                saida.innerHTML = ''; // Limpa a tela se o valor for inválido
                return;
            }

            const necessidades = valor * 0.5;
            const desejos = valor * 0.3;
            const investimentos = valor * 0.2;

            // Exibição corrigida e perfeitamente alinhada
            saida.innerHTML = `
               <div class="resultado-item">
                   <span class="label-categoria">Necessidades (50%):</span>
                   <span class="valor-categoria necessidades">${formatarMoeda(necessidades)}</span>
               </div>
               <div class="resultado-item">
                   <span class="label-categoria">Desejos (30%):</span>
                   <span class="valor-categoria desejos">${formatarMoeda(desejos)}</span>
               </div>
               <div class="resultado-item">
                   <span class="label-categoria">Investimentos (20%):</span>
                   <span class="valor-categoria investimentos">${formatarMoeda(investimentos)}</span>
               </div>
            `;
        }
     </script>  
</body>
</html>
